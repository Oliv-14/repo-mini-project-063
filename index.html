<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimasi Biaya Kegiatan Mahasiswa</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: linear-gradient(135deg, #f5f3ff 0%, #faf5ff 100%); 
        }
        .container { 
            max-width: 800px; 
            margin: 40px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.1); 
        }
        h1 { 
            color: #7c3aed; 
            text-align: center; 
        }
        .info-box { 
            background: #f3e8ff; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            border-left: 5px solid #a855f7; 
        }
        .price-list { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 30px; 
        }
        .price-card { 
            flex: 1; 
            background: #faf5ff; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            border: 2px solid #e9d5ff; 
        }
        .price-card h3 { 
            margin: 0 0 10px 0; 
            color: #7c3aed; 
        }
        
        /* Style untuk Form Kalkulator */
        .calculator { 
            background: #f3e8ff; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px;
            border: 2px solid #e9d5ff;
        }
        .calculator h3 {
            color: #7c3aed;
            margin-top: 0;
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold;
            color: #5b21b6;
        }
        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 2px solid #ddd6fe; 
            border-radius: 5px; 
            box-sizing: border-box;
            background: #faf5ff;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.1);
        }
        button { 
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 5px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { 
            background: linear-gradient(135deg, #9333ea 0%, #6d28d9 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        
        /* Style untuk JSON Response */
        .result-box { 
            margin-top: 20px; 
            padding: 15px; 
            background: #1e1b2e; 
            border-radius: 8px; 
            display: none;
            border: 2px solid #7c3aed;
        }
        .result-box h4 { 
            margin: 0 0 10px 0; 
            color: #d8b4fe;
            font-size: 1.1em;
        }
        pre {
            background: #2e1065;
            color: #e9d5ff;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            border: 1px solid #581c87;
        }
        
        h3 {
            color: #6d28d9;
            margin-bottom: 15px;
        }
        
        hr {
            border: none;
            border-top: 2px solid #e9d5ff;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Estimasi Biaya Kegiatan Mahasiswa</h1>
        
        <div class="info-box">
            <p><strong>Praktikum:</strong> Komputasi Awan - Serverless Azure<br>
            <strong>NIM:</strong> 0920240063<br>
            <strong>Nama:</strong> Olivia Sulistiana</p>
        </div>

        <h3>📋 Daftar Harga</h3>
        <div class="price-list">
            <div class="price-card"><h3>🍪 Snack</h3><p>Rp15.000/pax</p></div>
            <div class="price-card"><h3>🍱 Makan</h3><p>Rp30.000/pax</p></div>
            <div class="price-card"><h3>🎁 Lengkap</h3><p>Rp45.000/pax</p></div>
        </div>

        <!-- Bagian Kalkulator -->
        <div class="calculator">
            <h3>🧮 Hitung Estimasi</h3>
            <div class="form-group">
                <label>Jumlah Peserta:</label>
                <input type="number" id="jumlahInput" placeholder="Contoh: 40">
            </div>
            <div class="form-group">
                <label>Jenis Konsumsi:</label>
                <select id="jenisInput">
                    <option value="snack">Snack (Rp15.000)</option>
                    <option value="makan">Makan (Rp30.000)</option>
                    <option value="lengkap">Lengkap (Rp45.000)</option>
                </select>
            </div>
            <button onclick="hitungBiaya()">Hitung Total Biaya</button>
        </div>

        <!-- Box untuk menampilkan JSON Response -->
        <div id="resultBox" class="result-box">
            <h4>📦 JSON Response:</h4>
            <pre id="jsonOutput"></pre>
        </div>

        <hr>
    </div>

    <script>
        // Ganti dengan URL Function App kamu
        const FUNCTION_URL = "https://func-mini-project-063-hrdchtbyhhccg0gx.southeastasia-01.azurewebsites.net/api/HitungBiaya";

        async function hitungBiaya() {
            const jumlah = document.getElementById('jumlahInput').value;
            const jenis = document.getElementById('jenisInput').value;

            if (!jumlah || jumlah <= 0) {
                alert("Masukkan jumlah peserta yang valid!");
                return;
            }

            try {
                // Memanggil Azure Function
                const response = await fetch(`${FUNCTION_URL}?jumlah=${jumlah}&jenis=${jenis}`);
                const data = await response.json();

                // Tampilkan JSON mentah dengan formatting rapi
                document.getElementById('jsonOutput').textContent = JSON.stringify(data, null, 2);
                document.getElementById('resultBox').style.display = 'block';
                
            } catch (error) {
                alert("Gagal menghubungi API: " + error.message);
            }
        }
    </script>
</body>
</html>
